# 小程序测试配置
miniprogram:
  # 微信开发者工具配置
  developer_tools:
    path: "D:\\Program Files (x86)\\微信web开发者工具"  # 微信开发者工具安装路径
    port: 9222
    
  # 小程序配置
  app:
    appid: ""  # 小程序AppID
    version: "develop"
    
  # 测试环境
  environment:
    platform: ["ios", "android"]
    device_type: "phone"
    
  # 测试参数
  test_params:
    timeout: 30000  # 毫秒
    screenshot_interval: 1000  # 截图间隔（毫秒）
    
  # 微信API测试
  wechat_api:
    login: true
    payment: false
    share: true
